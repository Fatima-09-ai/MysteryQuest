
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Detective Profile | Mystery Quest</title>

    <link rel="stylesheet" href="css/profile.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="card">

        <!-- Detective Avatar -->

        <div class="profile-avatar">

            🕵️

        </div>

        <h1>

            Detective Identity Card

        </h1>

        <p class="subtitle">

            Authorized Investigator

        </p>

        <!-- Stats -->

        <div class="profile-item">

            <strong>

                <i class="fa-solid fa-user"></i>

                Username

            </strong>

            <span id="username">

                Loading...

            </span>

        </div>

        <div class="profile-item">

            <strong>

                <i class="fa-solid fa-envelope"></i>

                Email

            </strong>

            <span id="email">

                Loading...

            </span>

        </div>

        <div class="profile-item">

            <strong>

                ⭐ Points

            </strong>

            <span id="points">

                0

            </span>

        </div>

        <div class="profile-item">

            <strong>

                🧩 Current Level

            </strong>

            <span id="level">

                1

            </span>

        </div>

        <div class="profile-item">

            <strong>

                🏆 Achievements

            </strong>

            <span id="achievements">

                0

            </span>

        </div>

        <!-- Rank Card -->

        <div class="rankBox">

            <i class="fa-solid fa-award"></i>

            <h3>

                Detective Rank

            </h3>

            <p>

                Mystery Investigator

            </p>

        </div>

        <!-- Buttons -->

        <button onclick="window.location='dashboard.html'">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

        <button onclick="window.location='leaderboard.html'">

            <i class="fa-solid fa-trophy"></i>

            Leaderboard

        </button>

    </div>

</div>

<script src="js/api.js"></script>

<script src="js/profile.js"></script>

</body>

</html>
